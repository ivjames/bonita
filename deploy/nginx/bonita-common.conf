# bonita.lab980.com — routing, headers, caching, and legacy redirects.
# Symlinked as /etc/nginx/snippets/bonita.d/common.conf and included from
# the server block(s) in sites-available/bonita.lab980.com.conf, so conf
# changes deploy exactly like content: edit here, merge to main,
# `sudo bonita` (= git pull + nginx reload).

# Staging: keep the rebuild out of search indexes until cutover, so it
# never competes with the live Wix site. Remove this header (and the
# Disallow in robots.txt) when this becomes the production site.
add_header X-Robots-Tag "noindex, nofollow" always;

# Staging/dev only — REMOVE AT CUTOVER (same pass as the X-Robots-Tag
# header below and robots.txt): forces browsers to revalidate HTML before
# each view so deploys show up immediately while the site is iterated on
# (Safari/iPad has no hard refresh). no-cache = revalidate-before-use,
# not don't-store; ETags make unchanged pages a cheap 304. Once live,
# drop it and let browsers use their default heuristic caching.
add_header Cache-Control "no-cache" always;

# Security headers (add_header directives don't inherit once any are set
# in a block, so keep the full set together here).
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# Vimeo is the only embedded third party; forms are mailto-only.
add_header Content-Security-Policy "default-src 'self'; frame-src https://player.vimeo.com; img-src 'self' data:; script-src 'self'; style-src 'self'; base-uri 'self'; form-action 'self'" always;

# Clean URLs: /about -> about.html, /rentals/tech-specs ->
# rentals/tech-specs.html (mirrors the Wix paths, so existing links keep
# working after cutover).
location / {
    try_files $uri $uri.html $uri/ =404;
}

error_page 404 /404.html;

# Long-lived caching for fingerprint-free assets is deliberately modest;
# the site is tiny and correctness beats cache hit rate here. CSS/JS are
# referenced with a ?v=N query from the HTML — bump it there when those
# files change, or repeat visitors keep the cached copy for up to a day.
location /assets/ {
    add_header Cache-Control "public, max-age=86400";
    # add_header blocks don't inherit — restate the security set.
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Content-Type-Options "nosniff" always;
}

# The old Wix site served its PDFs from hashed /_files/ugd/ paths.
# Redirect them to the new self-hosted copies so old links/bookmarks
# keep working after cutover.
location = /_files/ugd/b50524_dd80a45c784b43f6960de7ba1839549b.pdf {
    return 301 /assets/pdf/bca-seating-chart.pdf;
}
location = /_files/ugd/b50524_69de25eb61e448e7874465e2acf16fd2.pdf {
    return 301 /assets/pdf/bca-building-layout.pdf;
}
location = /_files/ugd/b50524_9daf7a4fe4a94ef69b66642099102362.pdf {
    return 301 /assets/pdf/bca-stage-dimensions.pdf;
}

gzip on;
gzip_types text/css application/javascript image/svg+xml application/pdf;
gzip_min_length 1024;
