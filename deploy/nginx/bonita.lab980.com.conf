# bonita.lab980.com — static rebuild of bonitacenterforthearts.com
#
# This is only the server-block SHELL: listen/server_name/root plus an
# include of snippets/bonita.d/*.conf, where all the actual routing lives
# (bonita-common.conf and the optional API locations, symlinked into this
# repo's deploy/nginx/). The split exists because certbot rewrites the
# installed copy of THIS file in place for TLS, so it has to stay outside
# the repo — everything that might actually change deploys via the
# symlinks with a plain `sudo bonita` (git pull + nginx reload).
#
# Install to /etc/nginx/sites-available/ and symlink into sites-enabled
# (deploy/setup-droplet.sh does this, and rewrites `root` to point at the
# clone). This file is HTTP-only on purpose: `certbot --nginx -d
# bonita.lab980.com` rewrites it in place to add the 443 server block and
# the HTTP->HTTPS redirect, and keeps renewals wired up. Don't hand-add
# ssl_* lines before certbot runs — nginx refuses to start when the
# referenced cert files don't exist yet.

server {
    listen 80;
    listen [::]:80;
    server_name bonita.lab980.com;

    # nginx serves the repo checkout's site/ directory directly — deploys
    # are just `git pull` (sudo bonita). setup-droplet.sh rewrites this line
    # to point at wherever the clone actually lives.
    root /var/www/bonita/site;
    index index.html;

    # Headers, clean URLs, caching, legacy redirects, and (if provisioned)
    # the bca-api locations — symlinks into the checkout's deploy/nginx/.
    include snippets/bonita.d/*.conf;
}
